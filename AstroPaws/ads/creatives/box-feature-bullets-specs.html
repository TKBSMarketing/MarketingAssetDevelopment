<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astro Paws -- Box + Feature Bullets Specs (600x600)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

  .ad {
    width: 600px;
    height: 600px;
    background: #161929;
    position: relative;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* Starfield */
  .ad::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 22% 70%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 5% 45%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 35% 22%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 14% 88%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 60% 8%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 78% 18%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 92% 40%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 88% 78%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 55% 85%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 40% 55%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 96% 62%, rgba(255,255,255,0.55), transparent),
      radial-gradient(1px 1px at 30% 92%, rgba(255,255,255,0.5), transparent);
    z-index: 0;
  }

  /* Subtle nebula glow */
  .ad::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 18% 75%, rgba(74,127,181,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 25%, rgba(138,90,176,0.08) 0%, transparent 55%);
    z-index: 0;
  }

  .content {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 72px;            /* leave room for the CTA bar */
    display: flex;
    align-items: center;
    padding: 0 26px 0 28px;
    z-index: 5;
  }

  .box-wrap {
    flex: 0 0 236px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .box-wrap img {
    width: 236px;
    height: auto;
    filter: drop-shadow(0 16px 30px rgba(0,0,0,0.6))
            drop-shadow(0 0 24px rgba(74,127,181,0.30));
  }

  .features {
    flex: 1;
    list-style: none;
    padding-left: 22px;
  }

  .features li {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 13px 0;
  }

  .feature-icon {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .feature-icon svg {
    width: 38px;
    height: 38px;
    stroke: #ffffff;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .feature-text {
    font-size: 29px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.08;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }

  /* CTA bar */
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 72px;
    background: linear-gradient(135deg, #05ce78 0%, #04b86b 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .cta-text {
    font-size: 30px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
<div class="ad">
  <div class="content">
    <div class="box-wrap">
      <img src="../../assets/box-art-transparent.png" alt="Astro Paws box">
    </div>

    <ul class="features">
      <li>
        <span class="feature-icon">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="3"/><path d="M2.5 20a6.5 6.5 0 0 1 13 0"/><circle cx="17" cy="6" r="2.4"/><path d="M16 13.5a5.5 5.5 0 0 1 5.5 6"/></svg>
        </span>
        <span class="feature-text">2-5 Players</span>
      </li>
      <li>
        <span class="feature-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        </span>
        <span class="feature-text">15 Minute<br>Games</span>
      </li>
      <li>
        <span class="feature-icon">
          <svg viewBox="0 0 24 24"><path d="M9.5 4.5a3 3 0 0 0-3 3 3 3 0 0 0-1 5.6V17a2.5 2.5 0 0 0 5 0V4.5z"/><path d="M14.5 4.5a3 3 0 0 1 3 3 3 3 0 0 1 1 5.6V17a2.5 2.5 0 0 1-5 0V4.5z"/><path d="M12 4.5v15"/></svg>
        </span>
        <span class="feature-text">Easy to Learn</span>
      </li>
      <li>
        <span class="feature-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 14.5a3.5 3 0 0 0 6 0"/><circle cx="9" cy="10" r="0.5" fill="#fff" stroke="none"/><circle cx="15" cy="10" r="0.5" fill="#fff" stroke="none"/></svg>
        </span>
        <span class="feature-text">Ages 8+</span>
      </li>
      <li>
        <span class="feature-icon">
          <svg viewBox="0 0 24 24"><path d="M5 4h14v13a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3z"/><path d="M9 4v6a3 3 0 0 0 6 0V4"/></svg>
        </span>
        <span class="feature-text">Fits in Your<br>Pocket</span>
      </li>
    </ul>
  </div>

  <div class="cta-bar">
    <span class="cta-text">Back Us on Kickstarter</span>
  </div>
</div>
</body>
</html>
